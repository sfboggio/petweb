server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Correct MIME type for JS modules / SW
    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js;
        application/json            json;
        image/jpeg                  jpg jpeg;
        image/png                   png;
        image/webp                  webp;
        image/gif                   gif;
        image/x-icon                ico;
        application/manifest+json   webmanifest;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|webp|gif|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # images.json and SW: no cache (dynamic-ish)
    location ~* (images\.json|service-worker\.js)$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # All other routes -> index.html (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
