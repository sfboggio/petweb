services:
  petgallery:
    build: .
    container_name: petgallery
    ports:
      - "8080:80"
    # fotos/ ya viene copiada y convertida dentro de la imagen (HEIC → JPG).
    # Para agregar fotos: copiá los archivos a fotos/ y corré:
    #   docker compose up -d --build
    restart: unless-stopped
